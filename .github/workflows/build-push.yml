name: Build and Push to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/geolab-base

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # release-please already wrote the released version into this file as
      # part of the Release PR merge that created this release, so read it
      # directly instead of re-deriving it from the git tag name. This is
      # what guarantees the image tag and the package release are the same
      # version.
      - name: Read released version
        id: version
        run: echo "version=$(cat geolab-base/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./geolab-base
          file: ./geolab-base/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
